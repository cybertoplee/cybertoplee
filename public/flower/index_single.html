<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하나북카페 & 하나꽃집 프리미엄</title>
    <style>
:root {
    --primary-color: #d4af37; /* Gold */
    --text-color: #ffffff;
    --dark-bg: rgba(20, 20, 20, 0.85);
    --glass-bg: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-color);
    background-color: #111;
    overflow-x: hidden;
    scroll-behavior: smooth;
}

h1, h2, h3 {
    font-family: 'Playfair Display', 'Noto Sans KR', serif;
}

/* Hero Sections */
.hero-section {
    position: relative;
    width: 100vw;
    height: 100vh;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
    z-index: 1;
}

.flower-section .light-overlay {
    background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.8) 100%);
}

.content-container {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 1200px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 2rem;
    animation: fadeInUp 1s ease forwards;
    opacity: 0;
}

/* Header & Logo */
.header {
    width: 100%;
    margin-bottom: 2rem;
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.logo-img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--primary-color);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
}

.logo-img:hover {
    transform: scale(1.05);
}

.logo-text {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.text-dark {
    color: #333;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
}

/* Notice Banner (Glassmorphism) */
.notice-banner {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 15px;
    padding: 1.5rem 2rem;
    margin-bottom: 3rem;
    max-width: 800px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.notice-banner:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
}

.badge {
    background-color: var(--primary-color);
    color: #000;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-right: 10px;
    display: inline-block;
    margin-bottom: 0.5rem;
}

.notice-banner strong {
    font-size: 1.2rem;
    display: block;
    margin-bottom: 0.5rem;
}

.notice-desc {
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.8);
    line-height: 1.5;
}

/* Navigation Links */
.main-nav ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
}

.nav-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 1.8rem;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    text-decoration: none;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    font-weight: 500;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}

.nav-btn:hover {
    background: var(--primary-color);
    color: #000;
    transform: translateY(-2px);
    border-color: var(--primary-color);
}

.btn-light {
    background: rgba(255, 255, 255, 0.7);
    color: #333;
    border: 1px solid rgba(0, 0, 0, 0.1);
}

.btn-light:hover {
    background: var(--primary-color);
    color: white;
}

/* Intro Text for Flower Shop */
.intro-text {
    margin-bottom: 2rem;
    color: #333;
}

.intro-text h2 {
    font-size: 2.2rem;
    margin-bottom: 0.5rem;
}

.intro-text p {
    font-size: 1.2rem;
    color: #555;
}

/* Scroll Indicator */
.scroll-indicator {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    animation: bounce 2s infinite;
    opacity: 0.7;
}

.scroll-indicator span {
    font-size: 0.9rem;
    letter-spacing: 1px;
}

/* Footer Banner */
.footer-banner {
    background: #1a1a1a;
    padding: 4rem 2rem;
    text-align: center;
    border-top: 2px solid var(--primary-color);
}

.footer-content h3 {
    font-size: 1.8rem;
    margin-bottom: 2rem;
    color: var(--primary-color);
}

.social-links {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.social-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-weight: 500;
    transition: transform 0.3s, opacity 0.3s;
}

.social-btn:hover {
    transform: translateY(-3px);
    opacity: 0.9;
}

.daum { background: #fee500; color: #000; }
.naver { background: #03c75a; }
.insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
.fb { background: #1877f2; }

.copyright {
    color: #888;
    font-size: 0.9rem;
}

/* Gallery & Info Section */
.gallery-info-section {
    background-color: #0f131a;
    padding: 6rem 0;
    width: 100vw;
    display: flex;
    justify-content: center;
}

.section-title {
    font-size: 2.5rem;
    color: var(--primary-color);
    margin-bottom: 3rem;
    text-align: center;
    width: 100%;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    width: 100%;
    margin-bottom: 4rem;
}

.gallery-item {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    aspect-ratio: 1 / 1;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.gallery-item:hover img {
    transform: scale(1.1);
}

.item-info {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    padding: 20px;
    transform: translateY(10px);
    opacity: 0;
    transition: all 0.3s ease;
}

.gallery-item:hover .item-info {
    transform: translateY(0);
    opacity: 1;
}

.item-info h3 {
    color: white;
    font-size: 1.1rem;
    font-weight: 500;
}

/* Quick Links (Image Buttons) */
.quick-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    width: 100%;
}

.link-card {
    background: linear-gradient(135deg, #1e2532 0%, #0f131a 100%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    padding: 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    transition: all 0.3s ease;
    min-width: 120px;
}

.link-card i {
    font-size: 2rem;
    color: var(--primary-color);
}

.link-card span {
    font-weight: bold;
    font-size: 1.1rem;
}

.link-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    border-color: var(--primary-color);
    background: linear-gradient(135deg, #2a3444 0%, #161c26 100%);
}

/* Animations */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% {
        transform: translateY(0) translateX(-50%);
    }
    40% {
        transform: translateY(-15px) translateX(-50%);
    }
    60% {
        transform: translateY(-7px) translateX(-50%);
    }
}

/* Responsive */
@media (max-width: 768px) {
    .logo-text { font-size: 2rem; }
    .notice-banner { padding: 1rem; }
    .nav-btn { padding: 0.6rem 1.2rem; font-size: 0.9rem; }
}

/* Exit Button */
.exit-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background-color: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    text-decoration: none;
    font-weight: bold;
    z-index: 1000;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

.exit-btn:hover {
    background-color: var(--primary-color);
    color: #000;
    border-color: var(--primary-color);
    transform: translateY(-3px);
}

/* Tab Button Styles */
.nav-btn {
    cursor: pointer;
    background: transparent;
    font-family: inherit;
}
.tab-btn.active {
    background-color: var(--primary-color);
    color: #000;
    border-color: var(--primary-color);
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
}

/* Main Link Card at bottom */
.main-link-card {
    min-width: 300px;
    padding: 25px 40px;
    flex-direction: row;
    gap: 20px;
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0.8) 100%);
    border-color: var(--primary-color);
}
.main-link-card i {
    font-size: 2.5rem;
}
.main-link-card:hover {
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.4) 0%, rgba(0,0,0,0.9) 100%);
}

</style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- 하나북카페 섹션 -->
    <section id="bookcafe" class="hero-section" style="background-image: url('image/cafe_bg.png');">
        <div class="overlay"></div>
        <div class="content-container">
            <header class="header">
                <div class="logo-area">
                    <img src="image/cafe_logo.png" alt="하나북카페 로고" class="logo-img">
                    <h1 class="logo-text">하나북카페</h1>
                </div>
            </header>

            <div class="notice-banner">
                <div class="notice-content">
                    <span class="badge">민생에플러스+</span>
                    <strong>고유가 피해지원금 사용 가능 매장 (신용·체크 카드)</strong>
                    <p class="notice-desc">안내고유가 피해지원금 사용 가맹점 정보는 행정안전부(참여 신용카드사)와 사업주 분들께서 제공한 정보로, 실제 사용 가능 여부는 매장에 확인해주세요.</p>
                </div>
            </div>

            <nav class="main-nav">
                <ul id="tab-nav">
                    <li><button class="nav-btn tab-btn active" data-tab="home">홈</button></li>
                    <li><button class="nav-btn tab-btn" data-tab="menu">메뉴</button></li>
                    <li><button class="nav-btn tab-btn" data-tab="photo">사진</button></li>
                    <li><button class="nav-btn tab-btn" data-tab="info">정보</button></li>
                    <li><button class="nav-btn tab-btn" data-tab="review">리뷰</button></li>
                </ul>
            </nav>

        </div>
    </section>

    <!-- 갤러리 및 네이버 플레이스 링크 섹션 -->
    <section class="gallery-info-section">
        <div class="content-container">
            <h2 class="section-title">Photo & Information</h2>
            
            <!-- 4x3 갤러리 그리드 (12개) - 동적 렌더링 -->
            <div class="gallery-grid" id="dynamic-gallery">
                <!-- Javascript will render items here -->
            </div>

            <!-- 하단 네이버 플레이스 바로가기 버튼 -->
            <div class="quick-links" id="dynamic-link-wrapper">
                <!-- Javascript will render the big button here -->
            </div>

        </div>
    </section>

    <!-- 하나꽃집 섹션 -->
    <section id="flowershop" class="hero-section flower-section" style="background-image: url('image/flower_bg.png');">
        <div class="overlay light-overlay"></div>
        <div class="content-container">
            <header class="header">
                <div class="logo-area">
                    <img src="image/flower_logo.png" alt="하나꽃집 로고" class="logo-img">
                    <h1 class="logo-text text-dark">하나꽃집</h1>
                </div>
            </header>

            <div class="intro-text">
                <h2>당신의 일상에 향기를 더합니다</h2>
                <p>프리미엄 플라워 & 힐링 공간</p>
            </div>

            <nav class="main-nav">
                <ul>
                    <li><a href="https://pcmap.place.naver.com/place/2005144997/home?fromPanelNum=1&additionalHeight=76&timestamp=202607112127&locale=ko&svcName=map_pcv5" target="_blank" class="nav-btn btn-light">홈 <i class="fas fa-external-link-alt"></i></a></li>
                    <li><a href="https://pcmap.place.naver.com/place/2005144997/photo?fromPanelNum=1&additionalHeight=76&timestamp=202607112127&locale=ko&svcName=map_pcv5" target="_blank" class="nav-btn btn-light">사진 <i class="fas fa-external-link-alt"></i></a></li>
                </ul>
            </nav>
        </div>
    </section>

    <!-- 하단 푸터 베너 -->
    <footer class="footer-banner">
        <div class="footer-content">
            <h3>Contact & Social</h3>
            <div class="social-links">
                <a href="http://place.map.kakao.com/772505588?referrer=daumsearch_local" target="_blank" class="social-btn daum">
                    <i class="fas fa-map-marker-alt"></i> 다음
                </a>
                <a href="#" target="_blank" class="social-btn naver">
                    <i class="fas fa-map"></i> 네이버플레이스
                </a>
                <a href="#" target="_blank" class="social-btn insta">
                    <i class="fab fa-instagram"></i> 인스타그램
                </a>
                <a href="#" target="_blank" class="social-btn fb">
                    <i class="fab fa-facebook-f"></i> 페이스북
                </a>
            </div>
            <p class="copyright">© 하나북카페 & 하나꽃집. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- 오른쪽 하단 나가기 버튼 -->
    <a href="/portfolio/" class="exit-btn">
        <i class="fas fa-sign-out-alt"></i> 나가기
    </a>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    // URL Constants
    const baseUrl = "https://pcmap.place.naver.com/restaurant/2084020084";
    const queryParams = "?bk_query=%ED%95%98%EB%82%98%EB%B6%81%EC%B9%B4%ED%8E%98&entry=pll&fromPanelNum=2&timestamp=202607112117&locale=ko&svcName=map_pcv5&searchText=%ED%95%98%EB%82%98%EB%B6%81%EC%B9%B4%ED%8E%98";

    // Tab Data Configuration
    const tabsData = {
        home: {
            title: "홈",
            icon: "fa-home",
            url: baseUrl + "/home" + queryParams,
            items: Array.from({length: 12}, (_, i) => ({
                img: `https://picsum.photos/seed/cafehome${i+1}/600/600`,
                text: `카페 전경 ${i+1}`
            }))
        },
        menu: {
            title: "메뉴",
            icon: "fa-coffee",
            url: baseUrl + "/menu" + queryParams,
            items: Array.from({length: 12}, (_, i) => ({
                img: `https://picsum.photos/seed/cafemenu${i+1}/600/600`,
                text: `시그니처 메뉴 ${i+1}`
            }))
        },
        photo: {
            title: "사진",
            icon: "fa-camera-retro",
            url: baseUrl + "/photo" + queryParams,
            items: Array.from({length: 12}, (_, i) => ({
                img: `https://picsum.photos/seed/cafephoto${i+1}/600/600`,
                text: `고객 스냅사진 ${i+1}`
            }))
        },
        info: {
            title: "정보",
            icon: "fa-info-circle",
            url: baseUrl + "/information" + queryParams,
            items: Array.from({length: 12}, (_, i) => ({
                img: `https://picsum.photos/seed/cafeinfo${i+1}/600/600`,
                text: `매장 이용안내 ${i+1}`
            }))
        },
        review: {
            title: "리뷰",
            icon: "fa-star",
            url: baseUrl + "/review" + queryParams,
            items: Array.from({length: 12}, (_, i) => ({
                img: `https://picsum.photos/seed/cafereview${i+1}/600/600`,
                text: `베스트 리뷰 ${i+1}`
            }))
        }
    };

    const galleryGrid = document.getElementById('dynamic-gallery');
    const linkWrapper = document.getElementById('dynamic-link-wrapper');
    const tabBtns = document.querySelectorAll('.tab-btn');

    // Function to render gallery based on tab key
    function renderGallery(tabKey) {
        const data = tabsData[tabKey];
        if (!data) return;

        // 1. Render Gallery Items
        galleryGrid.style.opacity = 0; // fade out
        
        setTimeout(() => {
            galleryGrid.innerHTML = ''; // clear current
            
            data.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${item.img}" alt="${item.text}">
                    <div class="item-info"><h3>${item.text}</h3></div>
                `;
                galleryGrid.appendChild(div);
            });

            // 2. Render Bottom Link Button
            linkWrapper.innerHTML = `
                <a href="${data.url}" target="_blank" class="link-card main-link-card">
                    <i class="fas ${data.icon}"></i>
                    <span style="font-size: 1.3rem;">네이버 플레이스 '${data.title}' 자세히 보기</span>
                </a>
            `;

            galleryGrid.style.opacity = 1; // fade in
        }, 300); // Wait for fade out
    }

    // Event Listeners for Tabs
    tabBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            // Remove active class from all
            tabBtns.forEach(b => b.classList.remove('active'));
            // Add active class to clicked
            e.currentTarget.classList.add('active');
            
            // Render corresponding data
            const tabKey = e.currentTarget.getAttribute('data-tab');
            renderGallery(tabKey);
        });
    });

    // Initial Render
    if(galleryGrid && linkWrapper) {
        renderGallery('home');
        galleryGrid.style.transition = "opacity 0.3s ease";
    }

    // scroll animations
    const observerOptions = {
        root: null,
        rootMargin: '0px',
        threshold: 0.1
    };

    const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = 1;
                entry.target.style.transform = 'translateY(0)';
                observer.unobserve(entry.target);
            }
        });
    }, observerOptions);

    const animatedElements = document.querySelectorAll('.hero-section h1, .hero-section p, .notice-banner, .gallery-item');
    animatedElements.forEach(el => {
        el.style.opacity = 0;
        el.style.transform = 'translateY(30px)';
        el.style.transition = 'all 0.8s ease-out';
        observer.observe(el);
    });
});

</script>
