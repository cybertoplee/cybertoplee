<!-- GLOBAL SPA & UX SCRIPT V2 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 1. SPA Navigation & Scroll Lock
    const sections = Array.from(document.querySelectorAll('section[id], div.page-view, div[id^="view-"]')).filter(s => s.id);
    const header = document.querySelector('header');
    const footer = document.querySelector('footer');
    
    // Disable body scroll, enable inner scrolling
    document.body.style.overflow = 'hidden';
    document.body.style.height = '100dvh';
    document.body.style.display = 'flex';
    document.body.style.flexDirection = 'column';
    
    if (header) header.style.flexShrink = '0';
    // if (footer) footer.style.flexShrink = '0';

    if (sections.length > 0) {
        // Create a scrollable container for sections if not already existing
        let mainContainer = document.querySelector('main');
        if (!mainContainer) {
            mainContainer = document.createElement('main');
            mainContainer.style.flex = '1';
            mainContainer.style.overflowY = 'auto';
            mainContainer.style.overflowX = 'hidden';
            mainContainer.style.position = 'relative';
            
            // Move sections into main
            sections.forEach(sec => {
                sec.parentNode.insertBefore(mainContainer, sec);
            });
            sections.forEach(sec => mainContainer.appendChild(sec));
            if (footer) mainContainer.appendChild(footer);
        } else {
            mainContainer.style.flex = '1';
            mainContainer.style.overflowY = 'auto';
            mainContainer.style.overflowX = 'hidden';
            if (footer && footer.parentNode !== mainContainer) mainContainer.appendChild(footer);
        }

        // Section toggle logic
        function showSection(id) {
            let found = false;
            sections.forEach(sec => {
                if(sec.id === id || sec.id === id.replace('#', '') || sec.id === 'view-' + id.replace('#', '')) {
                    sec.style.display = 'block';
                    sec.style.opacity = '1';
                    sec.classList.add('active-view');
                    sec.style.minHeight = '100dvh';
                    found = true;
                } else {
                    sec.style.display = 'none';
                    sec.style.opacity = '0';
                    sec.classList.remove('active-view');
                }
            });
            if(!found && sections[0]) {
                sections[0].style.display = 'block';
                sections[0].style.opacity = '1';
                sections[0].classList.add('active-view');
            }
            if (mainContainer) mainContainer.scrollTo(0,0);
        }
        
        let initialHash = window.location.hash.replace('#', '') || (sections[0] ? sections[0].id.replace('view-', '') : '');
        showSection(initialHash);
        
        // Navigation links intercept
        document.querySelectorAll('a[href^="#"], button[onclick*="navigateTo"]').forEach(el => {
            el.addEventListener('click', function(e) {
                let targetId = '';
                if(this.tagName === 'A') {
                    targetId = this.getAttribute('href').replace('#', '');
                } else if(this.getAttribute('onclick')) {
                    const match = this.getAttribute('onclick').match(/navigateTo\(['"]([^'"]+)['"]\)/);
                    if(match) targetId = match[1];
                }
                
                if (!targetId || targetId === 'lightbox' || this.classList.contains('gallery-filter-btn')) return;
                
                e.preventDefault();
                history.pushState({section: targetId}, '', '#' + targetId);
                showSection(targetId);
                
                const mobileMenu = document.getElementById('mobile-menu');
                if (mobileMenu && !mobileMenu.classList.contains('hidden')) {
                    mobileMenu.classList.add('hidden');
                }
            });
        });
        
        // 8. Smartphone Hardware Back Button (Popstate)
        window.addEventListener('popstate', function(e) {
            if(e.state && e.state.section) {
                showSection(e.state.section);
            } else {
                const hash = window.location.hash.replace('#', '');
                showSection(hash || (sections[0] ? sections[0].id.replace('view-', '') : ''));
            }
        });
        
        // 7. Logo click -> First section
        const logos = document.querySelectorAll('header a:first-child, .logo, a[href="javascript:void(0)"]');
        logos.forEach(logo => {
            logo.addEventListener('click', function(e) {
                const isNav = this.classList.contains('nav-btn') || this.getAttribute('onclick');
                if(isNav) return;
                
                e.preventDefault();
                const firstId = sections[0].id.replace('view-', '');
                history.pushState({section: firstId}, '', '#' + firstId);
                showSection(firstId);
            });
        });
        
        // 9. Smartphone Swipe (Left/Right) for Prev/Next
        let currentIdx = () => sections.findIndex(s => s.style.display === 'block' || s.classList.contains('active-view'));
        function goNext() {
            let idx = currentIdx();
            if(idx >= 0 && idx < sections.length - 1) {
                let nextId = sections[idx+1].id.replace('view-', '');
                history.pushState({section: nextId}, '', '#' + nextId);
                showSection(nextId);
            }
        }
        function goPrev() {
            let idx = currentIdx();
            if(idx > 0) {
                let prevId = sections[idx-1].id.replace('view-', '');
                history.pushState({section: prevId}, '', '#' + prevId);
                showSection(prevId);
            }
        }
        
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight') goNext();
            else if(e.key === 'ArrowLeft') goPrev();
        });
        
        let touchstartX = 0, touchendX = 0, touchstartY = 0, touchendY = 0;
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
        }, {passive: true});
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            touchendY = e.changedTouches[0].screenY;
            const xDiff = touchendX - touchstartX;
            const yDiff = touchendY - touchstartY;
            if(Math.abs(xDiff) > Math.abs(yDiff) && Math.abs(xDiff) > 70) {
                if(xDiff < 0) goNext();
                else goPrev();
            }
        }, {passive: true});
    }

    // 6. Center Footer and Unified Information
    if(footer) {
        footer.classList.add('text-center');
        footer.style.textAlign = 'center';
        const elements = footer.querySelectorAll('ul, li, div, p, span, h4');
        elements.forEach(el => {
            if (el.tagName === 'LI' && el.classList.contains('flex')) {
                el.classList.remove('justify-start', 'items-start', 'text-left');
                el.classList.add('justify-center', 'items-center', 'text-center');
            }
            if (el.tagName === 'DIV' && el.classList.contains('text-left')) {
                el.classList.remove('text-left');
                el.classList.add('text-center');
                el.style.textAlign = 'center';
            }
        });
        const grids = footer.querySelectorAll('.grid');
        grids.forEach(g => {
            g.classList.add('text-center', 'justify-items-center');
        });
    }

    // 3. Replace all map links with Naver Place
    document.querySelectorAll('a[href*="map.kakao.com"], a[href*="google.com/maps"]').forEach(a => {
        // Extract company name or just default to a search query based on title
        const title = document.title.split('-')[0].trim();
        a.href = `https://map.naver.com/v5/search/${encodeURIComponent(title)}`;
        a.setAttribute('target', '_blank');
        if(a.innerText.includes('카카오') || a.innerText.includes('구글')) {
            a.innerHTML = '<i class="fa-solid fa-map-location-dot"></i> 네이버 플레이스 보기';
        }
    });

    // 2. Remove Exit Button
    const oldBtn = document.getElementById('global-exit-btn');
    // if(oldBtn) oldBtn.remove();
    const olderBtn = document.querySelector('a[href*="../index.html"], a[href*="/index.html"]');
    if(olderBtn && olderBtn.innerHTML.includes('img') && olderBtn.parentElement && olderBtn.parentElement.classList.contains('fixed')) {
        olderBtn.parentElement.remove();
    }
    
    // 1. Mobile Meta Tag Check
    if (!document.querySelector('meta[name="viewport"]')) {
        const meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
        document.head.appendChild(meta);
    } else {
        const meta = document.querySelector('meta[name="viewport"]');
        if(!meta.content.includes('user-scalable=no')) {
            meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
        }
    }
});
</script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const allowedPages = ['index.html', ''];
      document.querySelectorAll('a').forEach(link => {
        const href = link.getAttribute('href');
        if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('tel:') && !href.startsWith('mailto:')) {
          const pageName = href.split('?')[0].split('#')[0];
          if (pageName.endsWith('.html') && !allowedPages.includes(pageName)) {
            link.addEventListener('click', (e) => {
              e.preventDefault();
              showPreparationModal();
            });
          }
        }
      });
      
      function showPreparationModal() {
        let modal = document.getElementById('egdesk-prep-modal');
        if (!modal) {
          modal = document.createElement('div');
          modal.id = 'egdesk-prep-modal';
          modal.style.position = 'fixed';
          modal.style.inset = '0';
          modal.style.zIndex = '99999';
          modal.style.display = 'flex';
          modal.style.alignItems = 'center';
          modal.style.justifyContent = 'center';
          modal.style.backgroundColor = 'rgba(15, 23, 42, 0.65)';
          modal.style.backdropFilter = 'blur(6px)';
          modal.style.opacity = '0';
          modal.style.transition = 'opacity 0.25s ease';
          
          const card = document.createElement('div');
          card.style.backgroundColor = '#ffffff';
          card.style.borderRadius = '24px';
          card.style.padding = '36px 32px';
          card.style.maxWidth = '420px';
          card.style.width = '90%';
          card.style.textAlign = 'center';
          card.style.boxShadow = '0 25px 50px -12px rgba(0, 0, 0, 0.25)';
          card.style.border = '1px solid rgba(226, 232, 240, 0.8)';
          card.style.transform = 'scale(0.9)';
          card.style.transition = 'transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)';
          
          card.innerHTML = `
            <div style="width: 60px; height: 60px; background-color: #fef3c7; border-radius: 9999px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
              <svg style="width: 32px; height: 32px; color: #d97706;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
              </svg>
            </div>
            <h3 style="font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; letter-spacing: -0.02em;">준비 중인 서비스</h3>
            <p style="font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 28px; font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;">현재 데모 페이지에서는 제공되지 않는 기능입니다.<br>무료 제작 및 가입 문의는 보상 플랫폼으로 연락주세요!</p>
            <button id="egdesk-prep-close" style="width: 100%; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: #ffffff; border: none; padding: 14px 24px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);">확인</button>
          `;
          
          modal.appendChild(card);
          document.body.appendChild(modal);
          
          const closeBtn = card.querySelector('#egdesk-prep-close');
          closeBtn.addEventListener('click', hidePreparationModal);
          closeBtn.addEventListener('mouseover', () => closeBtn.style.transform = 'translateY(-1px)');
          closeBtn.addEventListener('mouseout', () => closeBtn.style.transform = 'translateY(0)');
          
          modal.addEventListener('click', (e) => {
            if (e.target === modal) hidePreparationModal();
          });
        }
        
        modal.style.display = 'flex';
        modal.offsetHeight;
        modal.style.opacity = '1';
        modal.querySelector('div').style.transform = 'scale(1)';
      }
      
      function hidePreparationModal() {
        const modal = document.getElementById('egdesk-prep-modal');
        if (modal) {
          modal.style.opacity = '0';
          modal.querySelector('div').style.transform = 'scale(0.9)';
          setTimeout(() => {
            modal.style.display = 'none';
          }, 250);
        }
      }
    });
  </script>
