<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="웹 호스팅부터 무료 홈페이지 제작, 네이버 블로그 및 인스타그램 SNS 연동 홍보까지 완벽하게 책임집니다." />
    <title>BOSANG Platform - 보상 플랫폼</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="../assets/main-DGi74ehK.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/jsx-runtime-BV3Ik2FS.js">
    <link rel="stylesheet" crossorigin href="../assets/src-BQM7_cIs.css">
  </head>
  <body>
    <div id="root"></div>
  
  <!-- EGDesk Preparation Modal Injected -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const allowedPages = ['index.html', ''];
      document.querySelectorAll('a').forEach(link => {
        const href = link.getAttribute('href');
        if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('tel:') && !href.startsWith('mailto:')) {
          const pageName = href.split('?')[0].split('#')[0];
          if (pageName.endsWith('.html') && !allowedPages.includes(pageName)) {
            link.addEventListener('click', (e) => {
              e.preventDefault();
              showPreparationModal();
            });
          }
        }
      });
      
      function showPreparationModal() {
        let modal = document.getElementById('egdesk-prep-modal');
        if (!modal) {
          modal = document.createElement('div');
          modal.id = 'egdesk-prep-modal';
          modal.style.position = 'fixed';
          modal.style.inset = '0';
          modal.style.zIndex = '99999';
          modal.style.display = 'flex';
          modal.style.alignItems = 'center';
          modal.style.justifyContent = 'center';
          modal.style.backgroundColor = 'rgba(15, 23, 42, 0.65)';
          modal.style.backdropFilter = 'blur(6px)';
          modal.style.opacity = '0';
          modal.style.transition = 'opacity 0.25s ease';
          
          const card = document.createElement('div');
          card.style.backgroundColor = '#ffffff';
          card.style.borderRadius = '24px';
          card.style.padding = '36px 32px';
          card.style.maxWidth = '420px';
          card.style.width = '90%';
          card.style.textAlign = 'center';
          card.style.boxShadow = '0 25px 50px -12px rgba(0, 0, 0, 0.25)';
          card.style.border = '1px solid rgba(226, 232, 240, 0.8)';
          card.style.transform = 'scale(0.9)';
          card.style.transition = 'transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)';
          
          card.innerHTML = `
            <div style="width: 60px; height: 60px; background-color: #fef3c7; border-radius: 9999px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
              <svg style="width: 32px; height: 32px; color: #d97706;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
              </svg>
            </div>
            <h3 style="font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; letter-spacing: -0.02em;">준비 중인 서비스</h3>
            <p style="font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 28px; font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;">현재 데모 페이지에서는 제공되지 않는 기능입니다.<br>무료 제작 및 가입 문의는 보상 플랫폼으로 연락주세요!</p>
            <button id="egdesk-prep-close" style="width: 100%; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: #ffffff; border: none; padding: 14px 24px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);">확인</button>
          `;
          
          modal.appendChild(card);
          document.body.appendChild(modal);
          
          const closeBtn = card.querySelector('#egdesk-prep-close');
          closeBtn.addEventListener('click', hidePreparationModal);
          closeBtn.addEventListener('mouseover', () => closeBtn.style.transform = 'translateY(-1px)');
          closeBtn.addEventListener('mouseout', () => closeBtn.style.transform = 'translateY(0)');
          
          modal.addEventListener('click', (e) => {
            if (e.target === modal) hidePreparationModal();
          });
        }
        
        modal.style.display = 'flex';
        modal.offsetHeight;
        modal.style.opacity = '1';
        modal.querySelector('div').style.transform = 'scale(1)';
      }
      
      function hidePreparationModal() {
        const modal = document.getElementById('egdesk-prep-modal');
        if (modal) {
          modal.style.opacity = '0';
          modal.querySelector('div').style.transform = 'scale(0.9)';
          setTimeout(() => {
            modal.style.display = 'none';
          }, 250);
        }
      }
    });
  </script>

</body>
</html>
