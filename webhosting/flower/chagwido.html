<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 & 차귀도 수용배낚시</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: #050814;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
            gap: 40px; /* 카드 사이 간격 */
            flex-wrap: wrap;
        }

        /* 공통 카드 UI */
        .card {
            background: linear-gradient(145deg, #09122b 0%, #173654 100%);
            width: 100%;
            max-width: 400px;
            height: 450px;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px) !important; /* slideUp 후 hover 적용을 위해 important 사용 또는 래퍼 사용 */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }

        .card.delay-1 {
            animation-delay: 0.2s;
        }

        /* Subtle glow effect top left */
        .card::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(73, 188, 244, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* 왼쪽 카드 특별 효과 (하나북카페) */
        .card.left-card::before {
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
        }
        .card.left-card .badge {
            border-color: #d4af37;
            color: #d4af37;
        }

        .badge {
            display: inline-block;
            border: 1px solid #1c5e83;
            color: #49bcf4;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 30px;
            align-self: flex-start;
            letter-spacing: 0.5px;
        }

        .title {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .description {
            color: #d1e3f0;
            font-size: 1.05rem;
            line-height: 1.7;
            font-weight: 400;
            margin-bottom: auto; /* 푸터를 바닥으로 밀어냄 */
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-top: 30px;
        }

        .arrow {
            font-size: 1.2rem;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- 왼쪽: 하나북카페 링크 카드 -->
    <a href="http://localhost:4001/homepage/index.html" class="card left-card">
        <div class="badge">PREMIUM CAFE</div>
        <h1 class="title">하나북카페 & 하나꽃집</h1>
        <p class="description">
            커피와 꽃향기가 머무는 곳<br>
            고급스러운 분위기의 프리미엄 북카페 공식 홈페이지
        </p>
        
        <div class="footer">
            <span>HOMEPAGE VIEW</span>
            <span class="arrow"><i class="fas fa-chevron-right"></i></span>
        </div>
    </a>



</body>
</html>
